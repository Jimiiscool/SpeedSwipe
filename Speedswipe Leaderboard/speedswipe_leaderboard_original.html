<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SPEEDSWIPE! — Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --fire-yellow: #FFE040;
      --fire-orange: #FF8800;
      --fire-red: #CC1500;
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --text: #f0e6d3;
      --muted: #666;
      --gold: #FFD700;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      z-index: 999;
    }

    .scene {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    canvas { image-rendering: pixelated; max-width: 100%; }

    .subtitle {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--fire-orange);
      letter-spacing: 4px;
      text-align: center;
      margin-bottom: 48px;
      opacity: 0.85;
    }

    .add-panel {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 2px solid var(--fire-orange);
      padding: 24px 28px;
      margin-bottom: 32px;
      position: relative;
    }

    .add-panel::before {
      content: 'NEW ENTRY';
      position: absolute;
      top: -10px; left: 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      background: var(--surface);
      color: var(--fire-orange);
      padding: 0 8px;
      letter-spacing: 2px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    .field label {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    .field input {
      background: #0d0d0d;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      padding: 10px 12px;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: var(--fire-orange); }
    .field input::placeholder { color: #333; }
    .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .btn-add {
      background: var(--fire-red);
      border: none;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      padding: 12px 16px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-add:hover { background: var(--fire-orange); }
    .btn-add:active { transform: scale(0.97); }

    .board { width: 100%; max-width: 680px; }

    .board-header {
      display: grid;
      grid-template-columns: 52px 1fr 150px 110px 60px;
      padding: 0 16px 10px;
      border-bottom: 1px solid var(--border);
    }

    .board-header span {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    .board-header span:not(:first-child) { text-align: center; }

    .entry {
      display: grid;
      grid-template-columns: 52px 1fr 150px 110px 60px;
      padding: 14px 16px;
      border-bottom: 1px solid #1a1a1a;
      align-items: center;
      transition: background 0.15s;
      animation: slideIn 0.3s ease forwards;
      opacity: 0;
    }

    @keyframes slideIn {
      from { transform: translateX(-16px); opacity: 0; }
      to   { transform: translateX(0);     opacity: 1; }
    }

    .entry:hover { background: #1a1a1a; }
    .entry.rank-1 { border-left: 3px solid var(--gold); }
    .entry.rank-2 { border-left: 3px solid var(--silver); }
    .entry.rank-3 { border-left: 3px solid var(--bronze); }

    .rank { font-family: 'Press Start 2P', monospace; font-size: 11px; }
    .rank-1 .rank { color: var(--gold); }
    .rank-2 .rank { color: var(--silver); }
    .rank-3 .rank { color: var(--bronze); }
    .entry:not(.rank-1):not(.rank-2):not(.rank-3) .rank { color: var(--muted); }

    .e-name { font-size: 16px; letter-spacing: 1px; }
    .e-time { text-align: center; font-size: 15px; color: var(--fire-yellow); }
    .rank-1 .e-time { color: var(--gold); text-shadow: 0 0 12px rgba(255,215,0,0.4); }
    .e-attempts { text-align: center; font-size: 14px; color: var(--muted); }

    .del-btn {
      text-align: center;
      background: none;
      border: none;
      color: #333;
      font-size: 14px;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      transition: color 0.15s;
      padding: 4px 8px;
    }
    .del-btn:hover { color: var(--fire-red); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      line-height: 2.2;
      border-bottom: 1px solid #1a1a1a;
    }

    .stats-bar {
      display: flex;
      gap: 32px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .stat { display: flex; flex-direction: column; gap: 4px; }
    .stat-label { font-family: 'Press Start 2P', monospace; font-size: 6px; color: var(--muted); letter-spacing: 2px; }
    .stat-value { font-size: 18px; color: var(--fire-orange); }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr 1fr; }
      .btn-add { grid-column: span 2; }
      .board-header, .entry { grid-template-columns: 40px 1fr 120px 90px 50px; }
    }
  </style>
</head>
<body>

  <div class="scene"><canvas id="c"></canvas></div>
  <div class="subtitle">LEADERBOARD</div>

  <div class="add-panel">
    <div class="form-row">
      <div class="field">
        <label>Player Name</label>
        <input id="inp-name" type="text" placeholder="ACE" maxlength="16" />
      </div>
      <div class="field">
        <label>Avg Time (s)</label>
        <input id="inp-time" type="number" placeholder="12.34" step="0.01" min="0" />
        <div class="hint">total time ÷ attempts</div>
      </div>
      <div class="field">
        <label>Attempts</label>
        <input id="inp-attempts" type="number" placeholder="3" min="1" />
      </div>
      <button class="btn-add" onclick="addEntry()">+ ADD</button>
    </div>
  </div>

  <div class="board">
    <div class="board-header">
      <span>Rank</span>
      <span style="text-align:left">Player</span>
      <span>Avg Time</span>
      <span>Attempts</span>
      <span></span>
    </div>
    <div id="board-rows"></div>
    <div class="stats-bar" id="stats-bar" style="display:none;">
      <div class="stat">
        <div class="stat-label">Players</div>
        <div class="stat-value" id="stat-players">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Best Avg</div>
        <div class="stat-value" id="stat-best">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Avg Attempts</div>
        <div class="stat-value" id="stat-avg">—</div>
      </div>
    </div>
  </div>

  <script>
    const TEXT = 'SPEEDSWIPE!';
    const FONT_SIZE = 56;
    const FONT = `${FONT_SIZE}px 'Press Start 2P', monospace`;
    const OUTLINE = 7;

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let fontReady = false;
    document.fonts.load(FONT).then(() => { fontReady = true; init(); });
    setTimeout(() => { if (!fontReady) init(); }, 2000);

    function init() {
      ctx.font = FONT;
      const tw = ctx.measureText(TEXT).width;
      const W = Math.ceil(tw + OUTLINE * 2 + 20);
      const H = FONT_SIZE + OUTLINE * 2 + 20;
      canvas.width = W;
      canvas.height = H;

      const grad = ctx.createLinearGradient(0, OUTLINE + 4, 0, H - OUTLINE - 4);
      grad.addColorStop(0,    '#FFE94D');
      grad.addColorStop(0.18, '#FFB800');
      grad.addColorStop(0.48, '#FF5500');
      grad.addColorStop(0.78, '#CC1200');
      grad.addColorStop(1,    '#6A0000');

      let offsetY = 0;
      let glitchClip = null;
      let glitchDX = 0;
      let glitching = false;

      function drawText(xOff, clip) {
        const x = OUTLINE + 10 + xOff;
        const y = FONT_SIZE + OUTLINE + 2;
        ctx.font = FONT;
        if (clip) {
          ctx.save();
          ctx.beginPath();
          ctx.rect(0, clip.top, canvas.width, clip.h);
          ctx.clip();
        }
        ctx.lineJoin = 'miter';
        ctx.miterLimit = 3;
        ctx.strokeStyle = '#1a0000';
        ctx.lineWidth = OUTLINE * 2;
        ctx.strokeText(TEXT, x, y + offsetY);
        ctx.fillStyle = grad;
        ctx.fillText(TEXT, x, y + offsetY);
        if (clip) ctx.restore();
      }

      function renderTitle() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawText(0, null);
        if (glitching && glitchClip) drawText(glitchDX, glitchClip);
        requestAnimationFrame(renderTitle);
      }

      let start = null;
      function animate(ts) {
        if (!start) start = ts;
        const t = (ts - start) / 1000;
        offsetY = Math.sin(t * 2.2) * 8 + Math.sin(t * 1.1) * 4;
        requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);
      renderTitle();

      function scheduleGlitch() {
        setTimeout(() => {
          const top = canvas.height * (0.2 + Math.random() * 0.35);
          const h   = canvas.height * (0.1 + Math.random() * 0.25);
          glitchClip = { top, h };
          glitchDX = (Math.random() - 0.5) * 18;
          glitching = true;
          setTimeout(() => { glitching = false; scheduleGlitch(); }, 80 + Math.random() * 100);
        }, 2500 + Math.random() * 3000);
      }
      scheduleGlitch();
    }

    let entries = JSON.parse(localStorage.getItem('speedswipe_lb') || '[]');

    function save() { localStorage.setItem('speedswipe_lb', JSON.stringify(entries)); }

    function render() {
      const sorted = [...entries].sort((a, b) => a.avgTime - b.avgTime);
      const container = document.getElementById('board-rows');
      container.innerHTML = '';

      if (sorted.length === 0) {
        container.innerHTML = `<div class="empty-state">NO ENTRIES YET<br><br>BE THE FIRST TO SWIPE</div>`;
        document.getElementById('stats-bar').style.display = 'none';
        return;
      }

      sorted.forEach((e, i) => {
        const rank = i + 1;
        const row = document.createElement('div');
        row.className = `entry${rank <= 3 ? ' rank-' + rank : ''}`;
        row.style.animationDelay = `${i * 40}ms`;
        const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;
        row.innerHTML = `
          <div class="rank">${medal}</div>
          <div class="e-name">${e.name}</div>
          <div class="e-time">${parseFloat(e.avgTime).toFixed(2)}s</div>
          <div class="e-attempts">${e.attempts}x</div>
          <button class="del-btn" onclick="removeEntry(${e.id})">✕</button>
        `;
        container.appendChild(row);
      });

      const statsBar = document.getElementById('stats-bar');
      statsBar.style.display = 'flex';
      document.getElementById('stat-players').textContent = sorted.length;
      document.getElementById('stat-best').textContent = parseFloat(sorted[0].avgTime).toFixed(2) + 's';
      const avgAttempts = (sorted.reduce((a, b) => a + b.attempts, 0) / sorted.length).toFixed(1);
      document.getElementById('stat-avg').textContent = avgAttempts;
    }

    function addEntry() {
      const name     = document.getElementById('inp-name').value.trim().toUpperCase();
      const avgTime  = parseFloat(document.getElementById('inp-time').value);
      const attempts = parseInt(document.getElementById('inp-attempts').value);

      if (!name)                           { flash('inp-name');     return; }
      if (isNaN(avgTime) || avgTime <= 0)  { flash('inp-time');     return; }
      if (isNaN(attempts) || attempts < 1) { flash('inp-attempts'); return; }

      entries.push({ id: Date.now(), name, avgTime, attempts });
      save();
      render();

      document.getElementById('inp-name').value = '';
      document.getElementById('inp-time').value = '';
      document.getElementById('inp-attempts').value = '';
      document.getElementById('inp-name').focus();
    }

    function flash(id) {
      const el = document.getElementById(id);
      el.style.borderColor = '#CC1500';
      setTimeout(() => el.style.borderColor = '', 600);
    }

    function removeEntry(id) {
      entries = entries.filter(e => e.id !== id);
      save();
      render();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); });
    render();
  </script>
</body>
</html>
