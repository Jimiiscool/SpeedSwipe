<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SPEEDSWIPE! — Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --fire-yellow: #FFE040;
      --fire-orange: #FF8800;
      --fire-red: #CC1500;
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --text: #f0e6d3;
      --muted: #666;
      --gold: #FFD700;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Full-page topographic background */
    #topo-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    body {
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      overflow-x: hidden;
      background: transparent;
      position: relative;
    }

    /* Scanline overlay on top of everything */
    body::before {
      content: '';
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      z-index: 999;
    }

    /* The gray rounded border frame — wraps the leaderboard content */
    .frame {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 760px;
      background: rgba(10, 10, 10, 0.50);
      border-radius: 22px;
      padding: 36px 36px 40px;
      box-shadow:
        0 0 0 2px rgba(160,158,158,0.18),
        0 8px 40px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.07);
    }

    /* Inner surface — fully transparent, no black box */
    .inner {
      background: transparent;
      border-radius: 12px;
      overflow: hidden;
      padding: 0 0 28px;
    }

    /* Title scene */
    .scene {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 110px;
      overflow: hidden;
      padding-top: 8px;
    }

    canvas#title-c { image-rendering: pixelated; max-width: 100%; }

    .subtitle {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      font-weight: 900;
      color: var(--fire-orange);
      letter-spacing: 5px;
      text-align: center;
      margin-bottom: 32px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.7);
    }

    /* ── Name-entry modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.active { display: flex; }

    .modal {
      background: #111;
      border: 2px solid var(--fire-orange);
      border-radius: 14px;
      padding: 36px 40px 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 40px rgba(255,136,0,0.25);
      display: flex;
      flex-direction: column;
      gap: 18px;
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn {
      from { transform: scale(0.92); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--fire-orange);
      letter-spacing: 2px;
      text-align: center;
    }
    .modal-sub {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: #888;
      text-align: center;
      letter-spacing: 1px;
    }

    .modal input {
      background: #0d0d0d;
      border: 2px solid var(--border);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      padding: 12px 16px;
      outline: none;
      width: 100%;
      text-align: center;
      letter-spacing: 3px;
      border-radius: 6px;
      transition: border-color 0.2s;
    }
    .modal input:focus { border-color: var(--fire-orange); }
    .modal input::placeholder { color: #333; letter-spacing: 1px; }
    .modal input.shake {
      animation: shake 0.35s ease;
      border-color: var(--fire-red);
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      60%      { transform: translateX(8px); }
    }

    .modal-btn {
      background: var(--fire-red);
      border: none;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      font-weight: 900;
      padding: 14px;
      cursor: pointer;
      letter-spacing: 2px;
      border-radius: 6px;
      transition: background 0.15s, transform 0.1s;
    }
    .modal-btn:hover  { background: var(--fire-orange); }
    .modal-btn:active { transform: scale(0.97); }

    .board { width: 100%; padding: 0 28px; }

    .board-header {
      display: grid;
      grid-template-columns: 52px 1fr 150px 110px 60px;
      padding: 18px 16px 10px;
      border-bottom: 1px solid rgba(42,42,42,0.7);
    }

    .board-header span {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      font-weight: 900;
      color: #aaa;
      letter-spacing: 2px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    .board-header span:not(:first-child) { text-align: center; }

    .entry {
      display: grid;
      grid-template-columns: 52px 1fr 150px 110px 60px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(30,30,30,0.5);
      align-items: center;
      transition: background 0.15s;
      animation: slideIn 0.3s ease forwards;
      opacity: 0;
    }

    @keyframes slideIn {
      from { transform: translateX(-16px); opacity: 0; }
      to   { transform: translateX(0);     opacity: 1; }
    }

    .entry:hover { background: rgba(30,30,30,0.5); }
    .entry.rank-1 { border-left: 3px solid var(--gold); }
    .entry.rank-2 { border-left: 3px solid var(--silver); }
    .entry.rank-3 { border-left: 3px solid var(--bronze); }

    .rank { font-family: 'Press Start 2P', monospace; font-size: 13px; font-weight: 900; }
    .rank-1 .rank { color: var(--gold); }
    .rank-2 .rank { color: var(--silver); }
    .rank-3 .rank { color: var(--bronze); }
    .entry:not(.rank-1):not(.rank-2):not(.rank-3) .rank { color: #999; }

    .e-name { font-size: 18px; font-weight: 700; letter-spacing: 1px; text-shadow: 0 1px 5px rgba(0,0,0,0.7); }
    .e-time { text-align: center; font-size: 17px; font-weight: 700; color: var(--fire-yellow); text-shadow: 0 1px 5px rgba(0,0,0,0.7); }
    .rank-1 .e-time { color: var(--gold); text-shadow: 0 0 12px rgba(255,215,0,0.4); }
    .e-attempts { text-align: center; font-size: 16px; font-weight: 700; color: #aaa; text-shadow: 0 1px 4px rgba(0,0,0,0.7); }

    .del-btn {
      text-align: center;
      background: none;
      border: none;
      color: #555;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      transition: color 0.15s;
      padding: 4px 8px;
    }
    .del-btn:hover { color: var(--fire-red); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #bbb;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      font-weight: 900;
      line-height: 2.4;
      border-bottom: 1px solid rgba(30,30,30,0.5);
      text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    }

    .stats-bar {
      display: flex;
      gap: 32px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(42,42,42,0.6);
    }

    .stat { display: flex; flex-direction: column; gap: 4px; }
    .stat-label { font-family: 'Press Start 2P', monospace; font-size: 8px; font-weight: 900; color: #aaa; letter-spacing: 2px; text-shadow: 0 1px 4px rgba(0,0,0,0.7); }
    .stat-value { font-size: 20px; font-weight: 700; color: var(--fire-orange); text-shadow: 0 1px 6px rgba(0,0,0,0.7); }

    .footer {
      position: relative;
      z-index: 10;
      margin-top: 20px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: #555;
      letter-spacing: 2px;
      text-align: center;
    }

    @media (max-width: 600px) {
      .frame { padding: 16px 10px 24px; }
      .board-header, .entry { grid-template-columns: 40px 1fr 120px 90px 50px; }
    }
  </style>
</head>
<body>

  <!-- Topographic animated background (fixed, full page) -->
  <canvas id="topo-bg"></canvas>

  <!-- Gray rounded frame containing everything -->
  <div class="frame">
    <div class="inner">

      <!-- Title canvas -->
      <div class="scene"><canvas id="title-c"></canvas></div>
      <div class="subtitle">LEADERBOARD</div>

  <!-- Name-entry modal (shown by Python trigger via window.triggerRun) -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <div class="modal-title">ENTER YOUR NAME</div>
      <div class="modal-sub" id="modal-sub">— — —</div>
      <input id="modal-name" type="text" placeholder="YOUR NAME" maxlength="16" autocomplete="off" />
      <button class="modal-btn" onclick="confirmName()">SUBMIT ▶</button>
    </div>
  </div>
      <div class="board">
        <div class="board-header">
          <span>Rank</span>
          <span style="text-align:left">Player</span>
          <span>Avg Time</span>
          <span>Attempts</span>
          <span></span>
        </div>
        <div id="board-rows"></div>
        <div class="stats-bar" id="stats-bar" style="display:none;">
          <div class="stat">
            <div class="stat-label">Players</div>
            <div class="stat-value" id="stat-players">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Best Avg</div>
            <div class="stat-value" id="stat-best">—</div>
          </div>
          <div class="stat">
            <div class="stat-label">Avg Attempts</div>
            <div class="stat-value" id="stat-avg">—</div>
          </div>
        </div>
      </div>

    </div><!-- /.inner -->
  </div><!-- /.frame -->

  <div class="footer">made with fake &lt;3 by gtms.s</div>

  <script>
    /* ─── TOPOGRAPHIC BACKGROUND ─── */
    (function() {
      const canvas = document.getElementById('topo-bg');
      const ctx = canvas.getContext('2d');

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      function noise(x, y, t) {
        const s1 = Math.sin(x * 0.8 + y * 0.5 + t * 0.3) * 0.4;
        const s2 = Math.cos(x * 0.4 - y * 0.7 + t * 0.2) * 0.3;
        const s3 = Math.sin(x * 1.2 + y * 0.9 - t * 0.15) * 0.15;
        const s4 = Math.cos(x * 0.3 + y * 1.1 + t * 0.25) * 0.15;
        return s1 + s2 + s3 + s4;
      }

      const LINES = 18;
      const BG = '#F9E4BC';
      const BAND_COLORS = [
        '#F9E4BC','#F2D49B','#EDBE7A','#E8A857','#E09040',
        '#D4733A','#C85C30','#BF4A28','#C85C30','#D4733A',
        '#E09040','#E8A857','#F0BC6A','#F5CC88','#F2D49B',
        '#EDD8A8','#F4E2BE','#F9E4BC',
      ];

      const parsedColors = BAND_COLORS.map(hex => [
        parseInt(hex.slice(1,3),16),
        parseInt(hex.slice(3,5),16),
        parseInt(hex.slice(5,7),16)
      ]);

      const cols = 120, rows = 80;
      const minV = -1.05, maxV = 1.05;
      let t = 0;

      const offscreen = document.createElement('canvas');
      offscreen.width  = cols + 1;
      offscreen.height = rows + 1;
      const octx = offscreen.getContext('2d');

      function interp(a, b, va, vb, level) {
        if ((va < level) === (vb < level)) return null;
        return (level - va) / (vb - va) * (b - a) + a;
      }

      function draw() {
        const W = canvas.width, H = canvas.height;

        const grid = [];
        for (let iy = 0; iy <= rows; iy++) {
          grid[iy] = [];
          for (let ix = 0; ix <= cols; ix++) {
            grid[iy][ix] = noise((ix / cols) * 6, (iy / rows) * 4, t);
          }
        }

        const imgData = octx.createImageData(cols + 1, rows + 1);
        const d = imgData.data;
        for (let iy = 0; iy <= rows; iy++) {
          for (let ix = 0; ix <= cols; ix++) {
            const v = grid[iy][ix];
            const ratio = Math.max(0, Math.min(1, (v - minV) / (maxV - minV)));
            const bi = Math.min(BAND_COLORS.length - 1, Math.max(0, Math.floor(ratio * BAND_COLORS.length)));
            const col = parsedColors[bi] || parsedColors[0];
            const idx = (iy * (cols + 1) + ix) * 4;
            d[idx] = col[0]; d[idx+1] = col[1]; d[idx+2] = col[2]; d[idx+3] = 255;
          }
        }
        octx.putImageData(imgData, 0, 0);

        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(offscreen, 0, 0, W, H);

        for (let li = 0; li < LINES; li++) {
          const level = minV + (li / (LINES - 1)) * (maxV - minV);
          ctx.beginPath();
          ctx.strokeStyle = 'rgba(80,40,20,0.55)';
          ctx.lineWidth = 1.4;
          ctx.lineJoin = 'round';
          ctx.lineCap  = 'round';

          for (let iy = 0; iy < rows; iy++) {
            for (let ix = 0; ix < cols; ix++) {
              const v00 = grid[iy][ix],   v10 = grid[iy][ix+1];
              const v01 = grid[iy+1][ix], v11 = grid[iy+1][ix+1];
              const px = ix / cols * W,   py  = iy / rows * H;
              const dx = W / cols,        dy  = H / rows;
              const pts = [];
              const top = interp(px, px+dx, v00, v10, level); if (top !== null) pts.push([top, py]);
              const bot = interp(px, px+dx, v01, v11, level); if (bot !== null) pts.push([bot, py+dy]);
              const lft = interp(py, py+dy, v00, v01, level); if (lft !== null) pts.push([px,  lft]);
              const rgt = interp(py, py+dy, v10, v11, level); if (rgt !== null) pts.push([px+dx, rgt]);
              if (pts.length >= 2) {
                ctx.moveTo(pts[0][0], pts[0][1]);
                ctx.lineTo(pts[1][0], pts[1][1]);
              }
            }
          }
          ctx.stroke();
        }

        t += 0.006;
        requestAnimationFrame(draw);
      }
      draw();
    })();

    /* ─── SPEEDSWIPE TITLE ─── */
    (function() {
      const TEXT = 'SPEEDSWIPE!';
      const FONT_SIZE = 56;
      const FONT = `${FONT_SIZE}px 'Press Start 2P', monospace`;
      const OUTLINE = 7;

      const canvas = document.getElementById('title-c');
      const ctx = canvas.getContext('2d');

      let fontReady = false;
      document.fonts.load(FONT).then(() => { fontReady = true; init(); });
      setTimeout(() => { if (!fontReady) init(); }, 2000);

      function init() {
        ctx.font = FONT;
        const tw = ctx.measureText(TEXT).width;
        const W = Math.ceil(tw + OUTLINE*2 + 20);
        const H = FONT_SIZE + OUTLINE*2 + 20;
        canvas.width = W;
        canvas.height = H;

        const grad = ctx.createLinearGradient(0, OUTLINE+4, 0, H-OUTLINE-4);
        grad.addColorStop(0,    '#FFE94D');
        grad.addColorStop(0.18, '#FFB800');
        grad.addColorStop(0.48, '#FF5500');
        grad.addColorStop(0.78, '#CC1200');
        grad.addColorStop(1,    '#6A0000');

        let offsetY = 0;
        let glitchClip = null, glitchDX = 0, glitching = false;

        function drawText(xOff, clip) {
          const x = OUTLINE+10+xOff;
          const y = FONT_SIZE+OUTLINE+2;
          ctx.font = FONT;
          if (clip) { ctx.save(); ctx.beginPath(); ctx.rect(0,clip.top,canvas.width,clip.h); ctx.clip(); }
          ctx.lineJoin='miter'; ctx.miterLimit=3;
          ctx.strokeStyle='#1a0000'; ctx.lineWidth=OUTLINE*2;
          ctx.strokeText(TEXT,x,y+offsetY);
          ctx.fillStyle=grad; ctx.fillText(TEXT,x,y+offsetY);
          if (clip) ctx.restore();
        }

        function renderTitle() {
          ctx.clearRect(0,0,canvas.width,canvas.height);
          drawText(0,null);
          if (glitching && glitchClip) drawText(glitchDX,glitchClip);
          requestAnimationFrame(renderTitle);
        }

        let start=null;
        function animate(ts) {
          if (!start) start=ts;
          const t=(ts-start)/1000;
          offsetY=Math.sin(t*2.2)*8+Math.sin(t*1.1)*4;
          requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
        renderTitle();

        function scheduleGlitch() {
          setTimeout(()=>{
            const top=canvas.height*(0.2+Math.random()*0.35);
            const h=canvas.height*(0.1+Math.random()*0.25);
            glitchClip={top,h}; glitchDX=(Math.random()-0.5)*18; glitching=true;
            setTimeout(()=>{glitching=false;scheduleGlitch();},80+Math.random()*100);
          },2500+Math.random()*3000);
        }
        scheduleGlitch();
      }
    })();

    /* ─── LEADERBOARD LOGIC ─── */
    let entries = JSON.parse(localStorage.getItem('speedswipe_lb') || '[]');
    function save() { localStorage.setItem('speedswipe_lb', JSON.stringify(entries)); }

    function render() {
      const sorted = [...entries].sort((a,b) => a.avgTime - b.avgTime);
      const container = document.getElementById('board-rows');
      container.innerHTML = '';

      if (sorted.length === 0) {
        container.innerHTML = `<div class="empty-state">NO ENTRIES YET<br><br>BE THE FIRST TO SWIPE</div>`;
        document.getElementById('stats-bar').style.display = 'none';
        return;
      }

      sorted.forEach((e, i) => {
        const rank = i + 1;
        const row = document.createElement('div');
        row.className = `entry${rank <= 3 ? ' rank-' + rank : ''}`;
        row.style.animationDelay = `${i * 40}ms`;
        const medal = rank===1 ? '🥇' : rank===2 ? '🥈' : rank===3 ? '🥉' : `#${rank}`;
        row.innerHTML = `
          <div class="rank">${medal}</div>
          <div class="e-name">${e.name}</div>
          <div class="e-time">${parseFloat(e.avgTime).toFixed(2)}s</div>
          <div class="e-attempts">${e.attempts}x</div>
          <button class="del-btn" onclick="removeEntry(${e.id})">✕</button>
        `;
        container.appendChild(row);
      });

      const statsBar = document.getElementById('stats-bar');
      statsBar.style.display = 'flex';
      document.getElementById('stat-players').textContent = sorted.length;
      document.getElementById('stat-best').textContent = parseFloat(sorted[0].avgTime).toFixed(2) + 's';
      const avgAttempts = (sorted.reduce((a,b) => a + b.attempts, 0) / sorted.length).toFixed(1);
      document.getElementById('stat-avg').textContent = avgAttempts;
    }

    function removeEntry(id) {
      entries = entries.filter(e => e.id !== id);
      save(); render();
    }

    let _pendingAvgTime = null;
    let _pendingAttempts = null;

    window.triggerRun = function(avgTime, attempts) {
      _pendingAvgTime = parseFloat(avgTime);
      _pendingAttempts = parseInt(attempts) || 1;

      document.getElementById('modal-sub').textContent =
        `TIME: ${_pendingAvgTime.toFixed(2)}s  ·  ATTEMPTS: ${_pendingAttempts}`;

      const input = document.getElementById('modal-name');
      input.value = '';
      document.getElementById('modal-backdrop').classList.add('active');
      setTimeout(() => input.focus(), 80);
    };

    function confirmName() {
      const input = document.getElementById('modal-name');
      const name = input.value.trim().toUpperCase();

      if (!name) {
        input.classList.remove('shake');
        void input.offsetWidth;
        input.classList.add('shake');
        setTimeout(() => input.classList.remove('shake'), 400);
        input.focus();
        return;
      }

      entries.push({ id: Date.now(), name, avgTime: _pendingAvgTime, attempts: _pendingAttempts });
      save();
      render();

      document.getElementById('modal-backdrop').classList.remove('active');
      _pendingAvgTime = null;
      _pendingAttempts = null;
    }

    document.getElementById('modal-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') confirmName();
    });

    document.getElementById('modal-backdrop').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-backdrop')) {
        document.getElementById('modal-backdrop').classList.remove('active');
      }
    });

    render();
  </script>
</body>
</html>
